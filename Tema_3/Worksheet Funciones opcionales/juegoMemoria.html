<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de la memoria</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: system-ui, sans-serif; max-width: 840px; margin: 24px auto; padding: 0 16px; }
h1 { font-size: 22px; margin: 0 0 12px; }
.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
label { font-size: 14px; }
select, input[type="number"], input[type="text"] { padding: 6px 8px; font-size: 14px; }
button { padding: 8px 12px; font-size: 14px; cursor: pointer; }
#board { white-space: pre; font-size: 24px; line-height: 1.4; border: 1px solid #ddd; border-radius: 8px; padding: 12px; min-height: 140px; }
.status { margin-top: 10px; min-height: 24px; font-weight: 600; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.grid-meta { display: flex; gap: 18px; margin: 10px 0; font-size: 13px; color: #555; }
small { color: #666; }
table { border-collapse: collapse; width: 100%; margin-top: 16px; font-size: 13px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
th { background: #f8f8f8; }
</style>
</head>
<body>
<h1>Juego de la memoria</h1>

<div class="controls">
  <label>Tablero:
    <select id="sizeSelect">
      <option value="4x3">4 × 3</option>
      <option value="4x4">4 × 4</option>
      <option value="6x4">6 × 4</option>
    </select>
  </label>
  <label>Intentos:
    <input id="attemptsInput" type="number" min="1" value="5">
  </label>
  <button id="startBtn">Iniciar partida</button>
  <div class="grid-meta"><div>Origen: (1,1) abajo-izquierda</div><div>Formato jugada: X,Y | X2,Y2</div></div>
</div>

<pre id="board">📦📦📦📦
📦📦📦📦
📦📦📦📦</pre>

<div class="row">
  <input id="moveInput" type="text" placeholder="1,1 | 3,2" size="22">
  <button id="playBtn">Jugar turno</button>
  <button id="restartBtn">Nueva partida</button>
</div>

<div id="hud" class="row">
  <div id="attemptsHud">Intentos restantes: 5</div>
  <div id="foundHud">Descubiertos: 0</div>
</div>

<div id="status" class="status"></div>

<h2>Historial</h2>
<table>
  <thead><tr><th>Fecha</th><th>Tablero</th><th>Intentos</th><th>Usados</th><th>Resultado</th></tr></thead>
  <tbody id="historyBody"></tbody>
</table>

<script src="juegoMemoria.js" defer></script>
</body>
</html>
