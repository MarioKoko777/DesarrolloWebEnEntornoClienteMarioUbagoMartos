<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Volumen de una esfera</title>
    </head>
    <body>
        <h1>Calculadora del volumen de una esfera</h1>
        <label for="radio">Introduce el radio:</label>
        <input type="number" id="radio" step="any">
        <button onclick="mostrarVolumen()">Calcular volumen</button>
        <p id="resultado"></p>
        <script>
            // Función que calcula el volumen de una esfera
            function calcularVolumenEsfera(radio) {
                return (4 / 3) * Math.PI * Math.pow(radio, 3);
            }
            // Función para mostrar el resultado en la web
            function mostrarVolumen() {
                const radio = parseFloat(document.getElementById("radio").value);
                if (radio <= 0 || isNaN(radio)) {
                    document.getElementById("resultado").textContent =
                        "Por favor, introduce un radio válido.";
                    return;
                }
                const volumen = calcularVolumenEsfera(radio);
                document.getElementById("resultado").textContent =
                    "El volumen de la esfera es: " + volumen.toFixed(2);
            }
        </script>
    </body>
</html>
