<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Frutas</title>
    </head>
    <body>
        <script>
            // Crear un array con 5 frutas
            const frutas = ["Manzana", "Banana", "Cereza", "Mango", "Naranja"];
            // Imprimir la primera fruta (índice 0)
            console.log("Primera fruta:", frutas[0]);
            // Imprimir la última fruta (índice length - 1)
            console.log("Última fruta:", frutas[frutas.length - 1]);
        </script>
    </body>
</html>
