<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Información de la Clase</title>
        <style>
            body { font-family: Arial, sans-serif; padding: 20px; }
            h1, h2, h3 { color: #333; }
            table { border-collapse: collapse; margin-top: 10px; width: 100%; max-width: 600px; }
            th, td { border: 1px solid #999; padding: 5px 10px; text-align: center; }
            input, button { margin: 5px 0; padding: 5px; }
        </style>
    </head>
    <body>
        <h1>Listado de alumnos</h1>
        <table>
            <thead>
            <tr>
                <th>Alumno</th>
                <th>Edad</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Nota 3</th>
            </tr>
            </thead>
            <tbody id="tablaAlumnos"></tbody>
        </table>
        <h2>Edad media de la clase:</h2>
        <p id="edadMedia"></p>
        <h2>Consultar nota de un alumno</h2>
        <label>Alumno (0-4): <input type="number" id="numAlumno" min="0" max="4"></label><br>
        <label>Trimestre (1-3, opcional): <input type="number" id="trimestre" min="1" max="3"></label><br>
        <button id="btnConsultar">Consultar nota</button>
        <h3>Resultado:</h3>
        <div id="resultado"></div>
        <script src="Ejercicio 3.js"></script>
        <script>
            // ===== Mostrar datos de los alumnos en la tabla =====
            const tabla = document.getElementById("tablaAlumnos");
            clase.forEach(alumno => {
            const datos = alumno.split(", ");
            tabla.innerHTML += `<tr>
                <td>${datos[0]}</td>
                <td>${datos[1]}</td>
                <td>${datos[2]}</td>
                <td>${datos[3]}</td>
                <td>${datos[4]}</td>
            </tr>`;
            });
            // ===== Mostrar edad media =====
            document.getElementById("edadMedia").innerText = edadMedia();
            // ===== Funcionalidad del botón de consulta =====
            document.getElementById("btnConsultar").addEventListener("click", () => {
            const numAlumno = Number(document.getElementById("numAlumno").value);
            const trimestreInput = document.getElementById("trimestre").value;
            const trimestre = trimestreInput ? Number(trimestreInput) : undefined;
            if (numAlumno < 0 || numAlumno >= clase.length) {
                alert("Alumno no válido");
                return;
            }
            const nota = obtenerNota(numAlumno, trimestre);
            if (nota === null) {
                alert("Trimestre no válido");
                return;
            }
            document.getElementById("resultado").innerText = `La nota es: ${nota}`;
            });
        </script>
    </body>
</html>
