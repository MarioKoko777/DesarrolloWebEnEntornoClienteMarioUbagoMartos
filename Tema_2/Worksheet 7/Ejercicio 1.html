<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Geolocalización en Tiempo Real</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 40px;
            }
            h1 { color: #2a9df4; }
            p { font-size: 1.1em; }
            #mapa {
                width: 100%;
                height: 400px;
                margin-top: 20px;
                border: 1px solid #444;
            }
        </style>
    </head>
    <body>
        <h1>Geolocalización en Tiempo Real</h1>
        <p id="estado">Comprobando disponibilidad de geolocalización...</p>
        <p>Latitud: <span id="lat"></span></p>
        <p>Longitud: <span id="lon"></span></p>
        <p>Distancia recorrida: <span id="distancia">0</span> metros</p>
        <div id="mapa"></div>
        <script>
            let watchId = null;
            let posiciones = []; // Guardará las posiciones para calcular distancia
            // Función para calcular distancia entre dos coordenadas usando la fórmula de Haversine
            function calcularDistancia(lat1, lon1, lat2, lon2) {
                const R = 6371000; // Radio de la Tierra en metros
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = 
                    Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }
            // Función que se llama cada vez que se obtiene la posición
            function actualizarPosicion(pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById('lat').textContent = lat.toFixed(6);
                document.getElementById('lon').textContent = lon.toFixed(6);
                // Guardar posición para medir distancia
                if (posiciones.length > 0) {
                    const ultima = posiciones[posiciones.length - 1];
                    const distancia = calcularDistancia(ultima.lat, ultima.lon, lat, lon);
                    posiciones.push({lat, lon, distancia: distancia});
                } else {
                    posiciones.push({lat, lon, distancia: 0});
                }
                // Calcular distancia total recorrida
                const total = posiciones.reduce((acc, p) => acc + p.distancia, 0);
                document.getElementById('distancia').textContent = total.toFixed(2);
                // Opcional: mostrar posición en mapa simple usando Google Maps Static API
                const mapaDiv = document.getElementById('mapa');
                mapaDiv.innerHTML = `<iframe
                    width="100%"
                    height="100%"
                    frameborder="0"
                    style="border:0"
                    src="https://www.google.com/maps?q=${lat},${lon}&hl=es&z=15&output=embed"
                    allowfullscreen>
                </iframe>`;
            }
            // Función de manejo de errores
            function manejarError(error) {
                let mensaje = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        mensaje = "Permiso denegado por el usuario.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        mensaje = "Posición no disponible.";
                        break;
                    case error.TIMEOUT:
                        mensaje = "Tiempo de espera agotado.";
                        break;
                    case error.UNKNOWN_ERROR:
                        mensaje = "Error desconocido.";
                        break;
                }
                document.getElementById('estado').textContent = mensaje;
            }
            // Comprobar disponibilidad
            if ("geolocation" in navigator) {
                document.getElementById('estado').textContent = "Geolocalización disponible. Obteniendo posición...";
                // Obtener posición continuamente
                watchId = navigator.geolocation.watchPosition(actualizarPosicion, manejarError, {
                    enableHighAccuracy: true,
                    maximumAge: 1000,
                    timeout: 5000
                });
            } else {
                document.getElementById('estado').textContent = "Geolocalización no disponible en este navegador.";
            }
        </script>
    </body>
</html>
