<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Geolocalización y Ruta en Tiempo Real</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 20px; }
            #map { width: 100%; height: 500px; margin-top: 20px; }
            p { font-size: 1.1em; }
        </style>
    </head>
    <body>
        <h1>Seguimiento de posición en tiempo real</h1>
        <p id="estado">Comprobando geolocalización...</p>
        <p>Latitud: <span id="lat"></span></p>
        <p>Longitud: <span id="lon"></span></p>
        <p>Distancia recorrida: <span id="distancia">0</span> metros</p>
        <div id="map"></div>
        <!-- API de Google Maps -->
        <script async
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCQs4dVPgPaENqfM302Mt_za7nfNJuFvGs">
        </script>
        <script>
            let map;
            let marcador;
            let ruta;
            let posiciones = [];
            let distanciaTotal = 0;
            // Inicializar el mapa
            function initMap() {
                map = new google.maps.Map(document.getElementById('map'), {
                    center: {lat: 0, lng: 0},
                    zoom: 15
                });
                // Polyline para la ruta
                ruta = new google.maps.Polyline({
                    path: [],
                    geodesic: true,
                    strokeColor: "#FF0000",
                    strokeOpacity: 1.0,
                    strokeWeight: 4,
                    map: map
                });
            }
            // Función para calcular distancia entre dos coordenadas
            function calcularDistancia(lat1, lon1, lat2, lon2) {
                const R = 6371000; // metros
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = 
                    Math.sin(dLat/2)**2 +
                    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                    Math.sin(dLon/2)**2;
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            }
            // Función que actualiza la posición
            function actualizarPosicion(pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById('lat').textContent = lat.toFixed(6);
                document.getElementById('lon').textContent = lon.toFixed(6);
                document.getElementById('estado').textContent = "Ubicación encontrada.";
                // Actualizar marcador
                if (!marcador) {
                    marcador = new google.maps.Marker({
                        position: {lat, lng: lon},
                        map: map,
                        title: "¡Aquí estás!",
                        animation: google.maps.Animation.BOUNCE
                    });
                } else {
                    marcador.setPosition({lat, lng: lon});
                }
                // Centrar mapa en el usuario
                map.setCenter({lat, lng: lon});
                // Actualizar la ruta
                ruta.getPath().push(new google.maps.LatLng(lat, lon));
                // Guardar posición para calcular distancia
                if (posiciones.length > 0) {
                    const ultima = posiciones[posiciones.length - 1];
                    const d = calcularDistancia(ultima.lat, ultima.lon, lat, lon);
                    distanciaTotal += d;
                }
                posiciones.push({lat, lon});

                document.getElementById('distancia').textContent = distanciaTotal.toFixed(2);
            }
            // Manejo de errores
            function manejarError(error) {
                let mensaje = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED: mensaje = "Permiso denegado por el usuario."; break;
                    case error.POSITION_UNAVAILABLE: mensaje = "Posición no disponible."; break;
                    case error.TIMEOUT: mensaje = "Tiempo de espera agotado."; break;
                    case error.UNKNOWN_ERROR: mensaje = "Error desconocido."; break;
                }
                document.getElementById('estado').textContent = mensaje;
            }
            // Inicializar mapa y geolocalización
            window.onload = () => {
                initMap();
                if ("geolocation" in navigator) {
                    navigator.geolocation.watchPosition(actualizarPosicion, manejarError, {
                        enableHighAccuracy: true,
                        maximumAge: 1000,
                        timeout: 5000
                    });
                } else {
                    document.getElementById('estado').textContent = "Geolocalización no disponible en este navegador.";
                }
            };
        </script>
    </body>
</html>
