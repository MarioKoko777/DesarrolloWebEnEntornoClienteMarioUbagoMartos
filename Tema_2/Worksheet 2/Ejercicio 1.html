<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Números Aleatorios</title>
    </head>
    <body>
        <h1>Generador de Números Aleatorios</h1>
        <div>
            <p>Número aleatorio entre 0 y 1: <span id="aleatorio01"></span></p>
            <p>Número aleatorio entre 100 y 200: <span id="aleatorio100_200"></span></p>
        </div>
        <div>
            <h2>Generar número aleatorio entre dos valores</h2>
            <label for="valor1">Valor mínimo:</label>
            <input type="number" id="valor1">
            <br>
            <label for="valor2">Valor máximo:</label>
            <input type="number" id="valor2">
            <br>
            <button onclick="generarEntre()">Generar</button>
            <p>Resultado: <span id="resultadoUsuario"></span></p>
        </div>
        <script>
            // Número aleatorio entre 0 y 1
            document.getElementById('aleatorio01').textContent = Math.random();
            // Número aleatorio entre 100 y 200
            const aleatorio100_200 = Math.random() * (200 - 100) + 100;
            document.getElementById('aleatorio100_200').textContent = aleatorio100_200.toFixed(2);
            // Función para generar número aleatorio entre dos valores ingresados por el usuario
            function generarEntre() {
                const min = parseFloat(document.getElementById('valor1').value);
                const max = parseFloat(document.getElementById('valor2').value);
                if (isNaN(min) || isNaN(max)) {
                    alert("Por favor, ingresa dos números válidos.");
                    return;
                }
                const aleatorioUsuario = Math.random() * (max - min) + min;
                document.getElementById('resultadoUsuario').textContent = aleatorioUsuario.toFixed(2);
            }
        </script>
    </body>
</html>
