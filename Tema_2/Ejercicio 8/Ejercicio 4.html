<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación en Tiempo Real</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #coords { font-size: 1.5rem; margin-top: 20px; }
        #map { width: 100%; height: 400px; margin-top: 20px; }
    </style>
    </head>
    <body>
    <h1>Ubicación en Tiempo Real 🌍</h1>
    <p id="coords">Esperando ubicación...</p>
    <div id="map"></div>
    <script>
        if ("geolocation" in navigator) {
        // Inicia el seguimiento de la ubicación
        navigator.geolocation.watchPosition(
            (position) => {
            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);
            document.getElementById("coords").textContent = `Latitud: ${lat}, Longitud: ${lon}`;
            // Opcional: mostrar en un mapa con OpenStreetMap
            document.getElementById("map").innerHTML = `
                <iframe 
                width="100%" 
                height="400" 
                frameborder="0" 
                scrolling="no" 
                marginheight="0" 
                marginwidth="0" 
                src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-0.01}%2C${lat-0.01}%2C${lon+0.01}%2C${lat+0.01}&layer=mapnik&marker=${lat}%2C${lon}" 
                ></iframe>
            `;
            },
            (error) => {
            document.getElementById("coords").textContent = `Error: ${error.message}`;
            },
            {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
            }
        );
        } else {
        document.getElementById("coords").textContent = "Geolocalización no soportada por este navegador.";
        }
    </script>
    </body>
</html>
