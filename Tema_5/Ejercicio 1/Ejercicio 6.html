<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Visor de Imágenes</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                background-color: #f0f0f0;
            }
            
            .visor-container {
                background-color: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
                text-align: center;
            }
            
            .imagen-container {
                margin-bottom: 20px;
            }
            
            #imagen {
                max-width: 600px;
                max-height: 400px;
                border-radius: 5px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            }
            
            .controles {
                display: flex;
                justify-content: center;
                gap: 20px;
            }
            
            button {
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
                background-color: #4CAF50;
                color: white;
                border: none;
                border-radius: 5px;
                transition: background-color 0.3s;
            }
            
            button:hover {
                background-color: #45a049;
            }
            
            button:disabled {
                background-color: #cccccc;
                cursor: not-allowed;
            }
            
            .contador {
                margin-top: 10px;
                font-size: 14px;
                color: #666;
            }
        </style>
    </head>
    <body>
        <div class="visor-container">
            <h1>Visor de Imágenes</h1>
            <div class="imagen-container">
                <img id="imagen" src="1.jpg" alt="Imagen 1">
            </div>
            <div class="controles">
                <button id="anterior" onclick="cambiarImagen('anterior')">Anterior</button>
                <button id="siguiente" onclick="cambiarImagen('siguiente')">Siguiente</button>
            </div>
            <div class="contador" id="contador">
                Imagen 1 de 6
            </div>
        </div>
        <script src="Ejercicio 6.js"></script>
    </body>
</html>
