<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Subir ficheros</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                max-width: 600px;
                margin: 50px auto;
                padding: 20px;
            }
            .file-input-group {
                margin-bottom: 15px;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 5px;
                background-color: #f9f9f9;
            }
            button {
                padding: 10px 20px;
                margin-right: 10px;
                cursor: pointer;
                background-color: #4CAF50;
                color: white;
                border: none;
                border-radius: 4px;
            }
            button:hover {
                background-color: #45a049;
            }
            #btnEnviar {
                background-color: #008CBA;
            }
            #btnEnviar:hover {
                background-color: #007399;
            }
        </style>
    </head>
    <body>
        <h1>Subir ficheros</h1>
        <form id="uploadForm">
            <div id="fileInputsContainer">
                <!-- Los inputs se agregarán aquí -->
            </div>
            <button type="button" id="btnAdjuntar">Adjuntar otro fichero</button>
            <button type="submit" id="btnEnviar">Enviar</button>
        </form>
        <script src="Ejercicio 5.js"></script>
    </body>
</html>
