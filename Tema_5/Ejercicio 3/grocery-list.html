<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grocery Bud</title>
  <style>
    :root{
      --bg:#eef5f9;
      --card:#ffffff;
      --text:#0f2544;
      --muted:#6b7a90;
      --primary:#3a78ff;
      --primary-600:#2a5cd6;
      --success:#2ecc71;
      --danger:#ff5a5f;
      --shadow:0 10px 30px rgba(15,37,68,.12);
      --radius:14px
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      display:grid;
      place-items:center;
      background:var(--bg);
      color:var(--text);
      font:16px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Apple Color Emoji, Segoe UI Emoji
    }
    .card{
      width:min(680px, 92vw);
      background:var(--card);
      padding:36px 40px 28px;
      border-radius:22px;
      box-shadow:var(--shadow)
    }
    h1{
      margin:0 0 18px;
      text-align:center;
      letter-spacing:.06em;
      font-weight:700
    }
    form{
      display:flex;
      gap:10px;
      margin-bottom:10px
    }
    input[type="text"]{
      flex:1;
      padding:14px 16px;
      border:2px solid var(--primary);
      border-radius:10px;
      outline:none;
      font-size:16px
    }
    input::placeholder{color:#8aa0c2}
    button{
      cursor:pointer;
      border:0;
      border-radius:10px;
      font-weight:600
    }
    .submit{
      background:var(--primary);
      color:#fff;
      padding:0 18px;
      min-width:100px
    }
    .submit:active{transform:translateY(1px)}
    ul{
      list-style:none;
      padding:0;
      margin:10px 0 8px;
    }
    li{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 6px;
      border-radius:8px;
    }
    li + li{margin-top:2px}
    .item-text{
      font-size:18px;
      letter-spacing:.02em
    }
    .actions{
      display:flex;
      gap:10px
    }
    .icon{
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:#f4f7fb;
      color:#3e3e3e
    }
    .icon.edit{color:var(--success)}
    .icon.delete{color:var(--danger)}
    .empty{
      text-align:center;
      color:var(--muted);
      margin:12px 0 8px
    }
    .clear{
      width:100%;
      background:transparent;
      color:#ff6b6e;
      padding:10px 6px;
      letter-spacing:.08em
    }
    .visually-hidden{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0
    }
  </style>
</head>
<body>
  <main class="card" id="app">
    <h1>Grocery Bud</h1>
    <form id="grocery-form" autocomplete="off">
      <label for="grocery-input" class="visually-hidden">Ingrediente</label>
      <input id="grocery-input" type="text" placeholder="e.g. eggs" />
      <button type="submit" class="submit" id="submit-btn">Submit</button>
    </form>
    <ul id="grocery-list"></ul>
    <p class="empty" id="empty-msg">Agrega un ítem para comenzar</p>
    <button id="clear-btn" class="clear" hidden>Clear Items</button>
  </main>
  <script src="grocery-list.js"></script>
</body>
</html>
