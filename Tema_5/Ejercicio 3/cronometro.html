<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronómetro</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f39c12;color:#fff;display:flex;min-height:100vh;align-items:center;justify-content:center}
.wrap{max-width:760px;width:100%;padding:32px;text-align:center}
.h1{font-size:42px;letter-spacing:2px}
.h2{font-size:26px;margin-top:4px;opacity:.9}
.time{font-family:Consolas,monospace;font-size:54px;margin:28px 0}
.row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{background:transparent;border:2px solid rgba(255,255,255,.9);color:#fff;border-radius:10px;padding:12px 30px;font-size:18px;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.12)}
.btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="wrap">
  <div class="h1">STOPWATCH</div>
  <div class="h2">VANILLA JAVASCRIPT STOPWATCH</div>
  <div id="display" class="time">00:00</div>
  <div class="row">
    <button id="startBtn" class="btn">Start</button>
    <button id="stopBtn" class="btn" disabled>Stop</button>
    <button id="resetBtn" class="btn" disabled>Reset</button>
  </div>
</div>
<script src="cronometro.js"></script>
</body>
</html>
