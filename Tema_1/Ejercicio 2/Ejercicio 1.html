<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Calculadora de Edad</title>
    </head>
    <body>
        <h1>Calculadora de Edad</h1>
        <!-- Input para el año de nacimiento -->
        <label for="anioNacimiento">Ingresa tu año de nacimiento:</label>
        <input type="number" id="anioNacimiento" placeholder="Ej: 1990">
        <button onclick="calcularEdad()">Calcular Edad</button>
        <!-- Aquí se mostrará el resultado -->
        <p id="resultado"></p>
        <script>
            function calcularEdad() {
                // 1. Guardar el año actual
                const anioActual = new Date().getFullYear();
                // 2. Obtener el año de nacimiento del input
                const anioNacimiento = parseInt(document.getElementById('anioNacimiento').value);
                // Validar que el usuario ingresó un número válido
                if (isNaN(anioNacimiento) || anioNacimiento > anioActual) {
                    document.getElementById('resultado').textContent = "Por favor ingresa un año válido.";
                    return;
                }
                // 3. Calcular las dos posibles edades
                const edad1 = anioActual - anioNacimiento;
                const edad2 = edad1 - 1;
                // 4. Mostrar en pantalla
                document.getElementById('resultado').textContent = `Tienen ${edad2} o ${edad1}`;
            }
        </script>
    </body>
</html>
