<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Conversor de Temperatura</title>
    </head>
    <body>
        <h1>Conversor de Temperatura</h1>
        <!-- Conversión de Celsius a Fahrenheit -->
        <h2>Celsius a Fahrenheit</h2>
        <label for="celsius">Ingresa temperatura en °C:</label>
        <input type="number" id="celsius" placeholder="Ej: 25"><br><br>
        <button onclick="celsiusAFahrenheit()">Convertir a °F</button>
        <p id="resultadoFahrenheit"></p>
        <hr>
        <!-- Conversión de Fahrenheit a Celsius -->
        <h2>Fahrenheit a Celsius</h2>
        <label for="fahrenheit">Ingresa temperatura en °F:</label>
        <input type="number" id="fahrenheit" placeholder="Ej: 77"><br><br>
        <button onclick="fahrenheitACelsius()">Convertir a °C</button>
        <p id="resultadoCelsius"></p>
        <script>
            // Función Celsius → Fahrenheit
            function celsiusAFahrenheit() {
                const celsius = parseFloat(document.getElementById('celsius').value);
                if (isNaN(celsius)) {
                    document.getElementById('resultadoFahrenheit').textContent = "Por favor ingresa un valor válido.";
                    return;
                }
                const fahrenheit = (celsius * 9/5) + 32;
                document.getElementById('resultadoFahrenheit').textContent =
                    `${celsius}°C son ${fahrenheit.toFixed(2)}°F`;
            }
            // Función Fahrenheit → Celsius
            function fahrenheitACelsius() {
                const fahrenheit = parseFloat(document.getElementById('fahrenheit').value);
                if (isNaN(fahrenheit)) {
                    document.getElementById('resultadoCelsius').textContent = "Por favor ingresa un valor válido.";
                    return;
                }
                const celsius = (fahrenheit - 32) * 5/9;
                document.getElementById('resultadoCelsius').textContent =
                    `${fahrenheit}°F son ${celsius.toFixed(2)}°C`;
            }
        </script>
    </body>
</html>
