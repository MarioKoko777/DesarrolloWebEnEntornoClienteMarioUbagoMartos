<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Adivina el número</title>
    </head>
    <body>
        <script>
            // Jugador 1 introduce el número a adivinar
            let num_adivinar = Number(prompt("Jugador 1: Introduce el número a adivinar"));
            // Inicializamos la variable del intento del jugador 2
            let num = null;
            // Mientras el número introducido por el jugador 2 sea diferente al número a adivinar
            while (num !== num_adivinar) {
                num = Number(prompt("Jugador 2: Adivina el número"));

                if (num < num_adivinar) {
                    alert("El número es mayor");
                } else if (num > num_adivinar) {
                    alert("El número es menor");
                } else {
                    alert("¡Felicidades! Has adivinado el número");
                }
            }
        </script>
    </body>
</html>
