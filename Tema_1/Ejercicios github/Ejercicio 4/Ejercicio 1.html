<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Cabeceras con JavaScript</title>
    </head>
    <body>
        <h2>Ejemplo de cabeceras generadas con JavaScript</h2>
        <script>
            // Bucle para mostrar cabeceras h1 a h6
            for (let i = 1; i <= 6; i++) {
                document.write("<h" + i + ">Cabecera h" + i + "</h" + i + ">");
            }
        </script>
    </body>
</html>
