<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Número Perfecto</title>
    </head>
    <body>
        <h2>Verificar si un número es perfecto</h2>
        <p id="resultado"></p>
        <script>
            // Solicitar número al usuario
            let numero = parseInt(prompt("Ingresa un número entero positivo"));
            // Variable para la suma de divisores
            let sumaDivisores = 0;
            if (numero > 0) {
                // Encontrar divisores propios (menores que el número)
                for (let i = 1; i < numero; i++) {
                    if (numero % i === 0) {
                        sumaDivisores += i;
                    }
                }
                // Verificar si es perfecto
                if (sumaDivisores === numero) {
                    document.getElementById("resultado").textContent =
                        numero + " es un número PERFECTO.";
                } else {
                    document.getElementById("resultado").textContent =
                        numero + " NO es un número perfecto.";
                }
            } else {
                document.getElementById("resultado").textContent =
                    "Por favor ingresa un número válido mayor que 0.";
            }
        </script>
    </body>
</html>
