<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Suma de números pares</title>
    </head>
    <body>
        <h2>Suma de números pares entre N y M</h2>
        <div id="resultado"></div>
        <script>
            // Pedir datos al usuario
            let n = parseInt(prompt("Ingrese el valor de N:"));
            let m = parseInt(prompt("Ingrese el valor de M:"));
            let suma = 0;
            // Validar que los valores sean correctos
            if (!isNaN(n) && !isNaN(m)) {
                // Asegurar que N sea menor que M
                let inicio = Math.min(n, m);
                let fin = Math.max(n, m);
                // Recorrer el rango y sumar los pares
                for (let i = inicio; i <= fin; i++) {
                    if (i % 2 === 0) {
                        suma += i;
                    }
                }
                document.getElementById("resultado").innerHTML =
                    "La suma de los números pares entre " + inicio + " y " + fin + " es: <b>" + suma + "</b>";
            } else {
                document.getElementById("resultado").innerHTML =
                    "Por favor, ingrese valores numéricos válidos.";
            }
        </script>
    </body>
</html>
