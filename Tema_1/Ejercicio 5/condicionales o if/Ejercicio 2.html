<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mayor de edad</title>
    </head>
    <body>
    <script>
        // Pedir la edad al usuario
        let edad = prompt("Introduce tu edad:");
        // Comprobar si es mayor de edad
        if (edad >= 18) {
            alert("Eres mayor de edad");
        } else {
            alert("Eres menor de edad");
        }
    </script>
    </body>
</html>
