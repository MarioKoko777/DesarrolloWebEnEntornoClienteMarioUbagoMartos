<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Números del 1 al 10</title>
    </head>
    <body>
    <script>
        // Mostrar números del 1 al 10
        for (let i = 1; i <= 10; i++) {
            document.write("<p>" + i + "</p>");
            document.write("<hr>");
        }
    </script>
    </body>
</html>
