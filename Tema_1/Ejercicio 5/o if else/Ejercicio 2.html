<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Jubilación</title>
    </head>
    <body>
    <script>
        // Pedir la edad al usuario
        let edad = parseInt(prompt("Introduce tu edad:"));
        // Comprobar si puede jubilarse
        if (edad >= 67) {
            alert("Puedes jubilarte.");
        } else {
            alert("Aún no puedes jubilarte.");
        }
    </script>
    </body>
</html>
