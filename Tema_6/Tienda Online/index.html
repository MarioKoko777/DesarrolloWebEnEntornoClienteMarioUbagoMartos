<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Platzi Fake Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1 class="title">Platzi Fake Store</h1>
    <div class="controls">
      <label for="categorySelect">Categoría</label>
      <select id="categorySelect" class="select"></select>
    </div>
  </header>
  <main id="mainView" class="main">
    <section id="products" class="products"></section>
    <div id="infiniteSentinel" class="sentinel"></div>
  </main>
  <section id="detailView" class="detail hidden">
    <button id="backButton" class="back">Volver</button>
    <div id="detailContent" class="detail-content"></div>
  </section>
  <script src="app.js"></script>
  <script src="tests.js"></script>
</body>
</html>
