<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ejercicio 7 — jQuery</title>
<link rel="stylesheet" href="styles.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<h1>Ejercicio 7 — jQuery</h1>

<section class="card">
<header class="site-header" id="cabecera">
<h2>Cabecera de la página</h2>
</header>
<div class="acciones">
<button id="btn-header">Alert cabecera</button>
<button id="btn-body">Alert body</button>
</div>
</section>

<section class="card">
<h2>Parágrafos</h2>
<p id="p1">Este es el primer párrafo.</p>
<p id="p2" class="intro">Este es el segundo párrafo. Al pinchar se oculta.</p>
</section>

<section class="card">
<h2>Lista</h2>
<ul id="lista">
<li>Elemento A</li>
<li>Elemento B</li>
<li>Elemento C</li>
</ul>
</section>

<section class="card">
<h2>Enlaces</h2>
<div id="enlaces" class="acciones">
<a href="#">Uno</a>
<a href="#">Dos</a>
<a href="#">Tres</a>
</div>
</section>

<section class="card">
<h2>Tabla con dos filas</h2>
<table id="t1">
<tbody>
<tr><td>Fila 1</td></tr>
<tr><td>Fila 2</td></tr>
</tbody>
</table>
</section>

<section class="card">
<h2>Tabla con tres filas</h2>
<table id="t2">
<tbody>
<tr><td>Fila A</td></tr>
<tr><td>Fila B</td></tr>
<tr><td>Fila C</td></tr>
</tbody>
</table>
</section>

<script src="app.js"></script>

</html>
