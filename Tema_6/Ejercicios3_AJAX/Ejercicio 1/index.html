<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ejercicios – AJAX (III) – Subida con progreso</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;padding:2rem;background:#f7f7f7;color:#222}
    .wrap{max-width:860px;margin:0 auto;background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:1.5rem}
    h1{font-size:1.5rem;margin:0 0 1rem}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Subida de archivo con progreso (AJAX)</h1>
    <form id="upload-form">
      <div>
        <label for="file">Selecciona imagen (PNG/JPG, ≤ 2MB)</label>
        <input id="file" name="file" type="file" accept="image/png,image/jpeg" required>
        <button type="button" id="btn-upload">Subir archivo</button>
      </div>
      <div id="progress" aria-live="polite" style="margin-top:.75rem;display:none">
        <div id="bar" style="height:12px;background:#6b8cff;width:0;border-radius:6px"></div>
        <div id="pct" style="margin-top:.35rem">0%</div>
      </div>
    </form>
    <div id="result" style="margin-top:1rem;display:none"></div>
    <div id="preview" style="margin-top:1rem"></div>
  </div>
  <link rel="stylesheet" href="./styles.css">
  <script src="./app.js"></script>
</body>
</html>
