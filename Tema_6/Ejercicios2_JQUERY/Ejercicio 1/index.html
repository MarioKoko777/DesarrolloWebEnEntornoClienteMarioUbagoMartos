<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ejercicio 1 — jQuery Slides</title>
<link rel="stylesheet" href="styles.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<h1>Ejercicio 1 — jQuery Slides</h1>
<section class="card">
<div id="slider" class="slider">
<div class="slide"><img src="https://picsum.photos/id/10/800/400" alt="Imagen 1"></div>
<div class="slide"><img src="https://picsum.photos/id/20/800/400" alt="Imagen 2"></div>
<div class="slide"><img src="https://picsum.photos/id/30/800/400" alt="Imagen 3"></div>
</div>
<div class="acciones">

</div>
</section>
<script src="app.js"></script>
</body>
