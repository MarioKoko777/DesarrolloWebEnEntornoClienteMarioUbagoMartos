<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ejercicios – AJAX (II) – Ejercicio 2</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;padding:2rem;background:#f7f7f7;color:#222}
    .wrap{max-width:820px;margin:0 auto;background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:1.5rem}
    h1{font-size:1.5rem;margin:0 0 1rem}
    p{margin:.5rem 0}
    .hint{margin-top:1rem;padding:.75rem;background:#f0f4ff;border:1px solid #dbe2ff;border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ejercicio 2</h1>
    <p>Respuesta del servidor en XML y maquetación del resultado.</p>
    <form id="form-validacion" autocomplete="on">
      <div>
        <label for="birthdate">Fecha de nacimiento</label>
        <input id="birthdate" name="birthdate" type="date" required>
      </div>
      <div>
        <label for="zip">Código postal</label>
        <input id="zip" name="zip" type="text" inputmode="numeric" pattern="\\d{5}" required>
      </div>
      <div>
        <label for="phone">Teléfono</label>
        <input id="phone" name="phone" type="tel" inputmode="numeric" pattern="\\d{9}" required>
      </div>
      <div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap">
        <button type="button" id="btn-get">Validar datos (GET/XML)</button>
        <button type="button" id="btn-post">Validar datos (POST/XML)</button>
      </div>
    </form>
    <div id="resultado" class="hint" style="display:none"></div>
  </div>
  <link rel="stylesheet" href="./styles.css">
  <script src="./app.js"></script>
</body>
</html>
