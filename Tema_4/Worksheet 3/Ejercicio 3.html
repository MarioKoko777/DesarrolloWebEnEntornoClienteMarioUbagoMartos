<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ejercicio 3</title>
        <style>
            :root { --bg: #0f172a; --panel: #0b1220; --accent: #2563eb; --accent-2: #1d4ed8; --text: #e5e7eb; }
            * { box-sizing: border-box; }
            body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif; color: var(--text); background: linear-gradient(180deg, var(--bg), #111827); min-height: 100vh; display: grid; place-items: center; padding: 24px; }
            .contenedorGaleria { width: min(90vw, 720px); aspect-ratio: 16/10; background: var(--panel); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.35); overflow: hidden; display: grid; place-items: center; touch-action: pan-y; }
            #tag-img { width: 100%; height: 100%; object-fit: contain; user-select: none; -webkit-user-drag: none; touch-action: pan-y; cursor: grab; }
            .controles { margin-top: 16px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
            .controles button { min-width: 140px; padding: 12px 18px; font-size: 1rem; font-weight: 600; color: #fff; background: var(--accent); border: none; border-radius: 12px; cursor: pointer; transition: transform .06s ease, background .2s ease, box-shadow .2s ease; box-shadow: 0 6px 16px rgba(37,99,235,.35); }
            .controles button:hover { transform: translateY(-1px); background: var(--accent-2); }
            .controles button:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(37,99,235,.35); }
            .controles button:focus-visible { outline: 3px solid rgba(37,99,235,.7); outline-offset: 2px; }
            @media (max-width: 480px) { .contenedorGaleria { aspect-ratio: 4/3; border-radius: 12px; } .controles button { min-width: 120px; padding: 10px 14px; border-radius: 10px; } }
        </style>
    </head>
    <body>
        <div class = "contenedorGaleria">
            <img id = "tag-img" src = "1.jpg" alt = "Galeria">
        </div>
        <div class = "controles">
            <button id = "btn-izq">Anterior</button>
            <button id = "btn-der">Siguiente</button>
        </div>
        <script src = "hammer.min.js"></script>
        <script src = "Ejercicio 3.js"></script>
    </body>
</html>
