<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caza del Color</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Caza del Color</h1>
        <p id="mensaje">Cargando...</p>
        <div class="game-board">
            <div class="color-square" id="rojo" data-color="rojo"></div>
            <div class="color-square" id="azul" data-color="azul"></div>
            <div class="color-square" id="verde" data-color="verde"></div>
            <div class="color-square" id="amarillo" data-color="amarillo"></div>
        </div>
        <p id="resultado"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
