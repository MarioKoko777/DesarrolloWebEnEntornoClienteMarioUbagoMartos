<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simón Dice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Simón Dice</h1>
        <p id="mensaje">Presiona "Iniciar" para comenzar</p>
        <p>Nivel: <span id="nivel">0</span></p>
        
        <div class="simon-board">
            <div class="btn-simon" id="verde" data-color="verde"></div>
            <div class="btn-simon" id="rojo" data-color="rojo"></div>
            <div class="btn-simon" id="amarillo" data-color="amarillo"></div>
            <div class="btn-simon" id="azul" data-color="azul"></div>
        </div>

        <button id="btn-start">Iniciar Juego</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
