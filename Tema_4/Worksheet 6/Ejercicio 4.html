<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Cookies</title>
        <script src="Ejercicio 4.js"></script>
    </head>
    <body>
        <h3>Crear Cookie</h3>
        <input id="idCrear" placeholder="Identificador">
        <input id="valorCrear" placeholder="Valor">
        <input id="diasCrear" type="number" placeholder="Días">
        <button onclick="crear()">Crear</button>
        <h3>Leer Cookie</h3>
        <input id="idLeer" placeholder="Identificador">
        <button onclick="leer()">Leer</button>
        <h3>Borrar Cookie</h3>
        <input id="idBorrar" placeholder="Identificador">
        <button onclick="borrar()">Borrar</button>
        <p id="resultado"></p>
    </body>
</html>
