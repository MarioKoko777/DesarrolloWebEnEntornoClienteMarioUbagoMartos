<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <title>La Lista de Lectura</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            :root{--bg:#0f172a;--panel:#111827;--muted:#6b7280;--accent:#6366f1;--accent2:#22d3ee;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444;--text:#e5e7eb}
            *{box-sizing:border-box}
            body{margin:0;background:linear-gradient(135deg,var(--bg),#111);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Arial,sans-serif}
            .container{max-width:1000px;margin:40px auto;padding:0 20px}
            .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
            .title{font-weight:700;font-size:1.6rem;letter-spacing:.3px}
            .badge{padding:6px 10px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:.85rem}
            .grid{display:grid;grid-template-columns:1fr;gap:16px}
            @media(min-width:900px){.grid{grid-template-columns:1.1fr .9fr}}
            .card{background:rgba(17,24,39,.7);backdrop-filter:blur(6px);border:1px solid rgba(99,102,241,.2);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
            .card .body{padding:18px}
            .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
            .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px}
            .stat .label{color:var(--muted);font-size:.8rem;margin-bottom:4px}
            .stat .value{font-size:1.1rem}
            .controls{display:flex;gap:10px;flex-wrap:wrap}
            button{border:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0b1020;padding:10px 14px;border-radius:10px;font-weight:600;cursor:pointer}
            button.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.15)}
            button:disabled{opacity:.5;cursor:not-allowed}
            form{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px}
            input{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--text)}
            table{width:100%;border-collapse:separate;border-spacing:0 10px}
            thead th{font-weight:600;color:var(--muted);text-align:left;padding:8px 10px}
            tbody td{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:10px;vertical-align:middle}
            tbody tr td:first-child{border-radius:10px 0 0 10px}
            tbody tr td:last-child{border-radius:0 10px 10px 0}
            .chip{display:inline-block;padding:6px 10px;border-radius:999px;font-size:.8rem}
            .chip.ok{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
            .chip.warn{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
            .chip.current{background:rgba(99,102,241,.18);color:#a5b4fc;border:1px solid rgba(99,102,241,.35)}
            .actions-row{display:flex;gap:8px}
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
            <div class="title">La Lista de Lectura</div>
            <div class="badge">Worksheet 2 · UI</div>
            </div>
            <div class="grid">
            <div class="card">
                <d
                iv class="body">
                <div class="stats" id="stats">
                    <div class="stat"><div class="label">Leídos</div><div class="value" id="stat-leidos">0</div></div>
                    <div class="stat"><div class="label">Pendientes</div><div class="value" id="stat-pendientes">0</div></div>
                    <div class="stat"><div class="label">Actual</div><div class="value" id="stat-actual">-</div></div>
                    <div class="stat"><div class="label">Próximo</div><div class="value" id="stat-proximo">-</div></div>
                    <div class="stat"><div class="label">Último</div><div class="value" id="stat-ultimo">-</div></div>
                </div>
                <div style="height:12px"></div>
                <div class="controls">
                    <button id="btn-finish">Finalizar libro actual</button>
                    <button class="secondary" id="btn-samples">Añadir ejemplos</button>
                </div>
                </div>
            </div>
            <div class="card">
                <div class="body">
                <form id="form-add">
                    <input id="in-titulo" placeholder="Título" required>
                    <input id="in-genero" placeholder="Género" required>
                    <input id="in-autor" placeholder="Autor" required>
                    <button type="submit">Agregar</button>
                </form>
                </div>
            </div>
            </div>
            <div style="height:16px"></div>
            <div class="card">
            <div class="body">
                <table>
                <thead>
                    <tr>
                    <th>Título</th>
                    <th>Género</th>
                    <th>Autor</th>
                    <th>Estado</th>
                    <th>Fecha lectura</th>
                    <th>Marcadores</th>
                    <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-libros"></tbody>
                </table>
            </div>
            </div>
        </div>
        <script src="LaListaDeLectura.js"></script>
        <script>
            const miLista = new BookList();
            const els = {
            leidos: document.getElementById('stat-leidos'),
            pendientes: document.getElementById('stat-pendientes'),
            actual: document.getElementById('stat-actual'),
            proximo: document.getElementById('stat-proximo'),
            ultimo: document.getElementById('stat-ultimo'),
            tbody: document.getElementById('tbody-libros'),
            btnFinish: document.getElementById('btn-finish'),
            btnSamples: document.getElementById('btn-samples'),
            form: document.getElementById('form-add'),
            inTitulo: document.getElementById('in-titulo'),
            inGenero: document.getElementById('in-genero'),
            inAutor: document.getElementById('in-autor')
            };
            function renderResumen() {
            els.leidos.textContent = miLista.leidos;
            els.pendientes.textContent = miLista.noLeidos;
            els.actual.textContent = miLista.libroActual ? miLista.libroActual.titulo : '-';
            els.proximo.textContent = miLista.proximoLibro ? miLista.proximoLibro.titulo : '-';
            els.ultimo.textContent = miLista.ultimoLeido ? miLista.ultimoLeido.titulo : '-';
            }
            function renderLibros() {
            els.tbody.innerHTML = '';
            miLista.libros.forEach((b, i) => {
                const tr = document.createElement('tr');
                const tdTitulo = document.createElement('td'); tdTitulo.textContent = b.titulo;
                const tdGenero = document.createElement('td'); tdGenero.textContent = b.genero;
                const tdAutor = document.createElement('td'); tdAutor.textContent = b.autor;
                const tdEstado = document.createElement('td');
                const chipEstado = document.createElement('span');
                chipEstado.className = 'chip ' + (b.leido ? 'ok' : 'warn');
                chipEstado.textContent = b.leido ? 'Leído' : 'No leído';
                tdEstado.appendChild(chipEstado);
                const tdFecha = document.createElement('td');
                tdFecha.textContent = b.fechaLectura ? new Date(b.fechaLectura).toLocaleString('es-ES') : '-';
                const tdMarks = document.createElement('td');
                const marks = [];
                if (miLista.libroActual === b) {
                const c = document.createElement('span');
                c.className = 'chip current'; c.textContent = 'Actual';
                marks.push(c);
                }
                if (miLista.proximoLibro === b) {
                const c = document.createElement('span');
                c.className = 'chip'; c.textContent = 'Próximo';
                c.style.background = 'rgba(34,211,238,.16)';
                c.style.color = '#67e8f9';
                c.style.border = '1px solid rgba(34,211,238,.35)';
                marks.push(c);
                }
                marks.forEach(m => tdMarks.appendChild(m));
                const tdAcciones = document.createElement('td');
                const rowActions = document.createElement('div');
                rowActions.className = 'actions-row';
                if (!b.leido) {
                const btnSet = document.createElement('button');
                btnSet.className = 'secondary set-current';
                btnSet.textContent = 'Establecer como actual';
                btnSet.dataset.index = String(i);
                rowActions.appendChild(btnSet);
                }
                tdAcciones.appendChild(rowActions);
                [tdTitulo, tdGenero, tdAutor, tdEstado, tdFecha, tdMarks, tdAcciones].forEach(td => tr.appendChild(td));
                els.tbody.appendChild(tr);
            });
            }
            function updateButtons() {
            els.btnFinish.disabled = !miLista.libroActual;
            }
            function updateUI() {
            renderResumen();
            renderLibros();
            updateButtons();
            }
            els.form.addEventListener('submit', (e) => {
            e.preventDefault();
            const t = els.inTitulo.value.trim();
            const g = els.inGenero.value.trim();
            const a = els.inAutor.value.trim();
            if (!t || !g || !a) return;
            miLista.add(new Book(t, g, a));
            els.inTitulo.value = ''; els.inGenero.value = ''; els.inAutor.value = '';
            updateUI();
            });
            els.btnFinish.addEventListener('click', () => {
            miLista.finishCurrentBook();
            updateUI();
            });
            els.btnSamples.addEventListener('click', () => {
            const ejemplos = [
                new Book('Cien Años de Soledad', 'Novela', 'Gabriel García Márquez'),
                new Book('El Principito', 'Infantil', 'Antoine de Saint-Exupéry'),
                new Book('1984', 'Distopía', 'George Orwell')
            ];
            ejemplos.forEach(b => miLista.add(b));
            updateUI();
            });
            document.addEventListener('click', (e) => {
            const tgt = e.target;
            if (tgt && tgt.classList.contains('set-current')) {
                const idx = Number(tgt.dataset.index || -1);
                if (idx >= 0) {
                const book = miLista.libros[idx];
                miLista.libroActual = book;
                miLista.proximoLibro = miLista.obtenerProximoLibro();
                updateUI();
                }
            }
            });
            updateUI();
        </script>
    </body>
</html>
